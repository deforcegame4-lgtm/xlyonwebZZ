<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XylonWebz — Secure Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0c12;
    --surface: #12151f;
    --surface-2: #181c2a;
    --border: #232838;
    --text: #e9eaf3;
    --muted: #868ca3;
    --violet: #7c3aed;
    --cyan: #06b6d4;
    --pink: #ec4899;
    --success: #34d399;
    --danger: #fb7185;
    --warning: #fbbf24;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow-x: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 24px;
  }

  /* ---------- Ambient background ---------- */
  .grid-overlay {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 40%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .bg-glow {
    position: fixed;
    width: 480px;
    height: 480px;
    border-radius: 50%;
    filter: blur(110px);
    opacity: 0.28;
    pointer-events: none;
    z-index: 0;
  }
  .bg-glow-1 { background: var(--violet); top: -120px; left: -120px; animation: drift1 14s ease-in-out infinite; }
  .bg-glow-2 { background: var(--cyan); bottom: -140px; right: -100px; animation: drift2 16s ease-in-out infinite; }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(60px, 40px); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-50px, -30px); }
  }

  /* ---------- Layout ---------- */
  .page {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 400px;
  }

  .brand { text-align: center; margin-bottom: 28px; }

  .brand-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 42px;
    margin: 0;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--violet), var(--cyan), var(--pink), var(--violet));
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: gradientShift 6s linear infinite;
  }

  @keyframes gradientShift {
    to { background-position: -300% center; }
  }

  .brand-tag {
    margin: 6px 0 0;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
  }

  /* ---------- Card with rotating gradient border ---------- */
  @property --angle {
    syntax: '<angle>';
    inherits: false;
    initial-value: 0deg;
  }

  .card-wrapper {
    width: 100%;
    padding: 1.5px;
    border-radius: 22px;
    background: conic-gradient(from var(--angle), var(--violet), var(--cyan), var(--pink), var(--violet));
    animation: rotateBorder 5s linear infinite;
  }

  @keyframes rotateBorder {
    to { --angle: 360deg; }
  }

  .card {
    background: var(--surface);
    border-radius: 20.5px;
    padding: 32px 28px;
    transition: transform 0.18s ease;
  }

  .card.shake {
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(7px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(3px); }
  }

  .card-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 1.5px;
    color: var(--success);
    margin-bottom: 18px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6);
    animation: pulseDot 2s ease-out infinite;
  }
  @keyframes pulseDot {
    0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.5); }
    70% { box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
    100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
  }

  .card-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    margin: 0 0 22px;
  }

  /* ---------- Form ---------- */
  .field {
    display: block;
    margin-bottom: 16px;
  }

  .field-label {
    display: block;
    font-size: 12.5px;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .field-input {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 0 12px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  .field-input:focus-within {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12);
  }

  .field-input svg { flex-shrink: 0; color: var(--muted); }

  .field-input input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 12px 0;
  }

  .field-input input::placeholder { color: #565c70; }

  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    padding: 4px;
  }
  .icon-btn:hover { color: var(--text); }

  .btn-primary {
    width: 100%;
    border: none;
    border-radius: 11px;
    padding: 13px;
    margin-top: 6px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14.5px;
    color: #0a0c12;
    background: linear-gradient(90deg, var(--cyan), var(--violet));
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.12s ease, filter 0.15s ease;
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 22px 0 16px;
    color: var(--muted);
    font-size: 11.5px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .get-akses {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 11px;
    border-radius: 11px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 500;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .get-akses:hover {
    border-color: var(--cyan);
    background: #1b2030;
  }
  .get-akses svg { color: #2aabee; flex-shrink: 0; }

  .footer-text {
    margin-top: 22px;
    font-size: 11px;
    color: #565c70;
    text-align: center;
  }

  /* ---------- iOS style notification ---------- */
  #notif-container {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    z-index: 50;
    pointer-events: none;
  }

  .notif {
    pointer-events: auto;
    margin-top: 14px;
    width: min(94%, 380px);
    display: flex;
    gap: 11px;
    align-items: flex-start;
    background: rgba(28, 30, 38, 0.78);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 12px 14px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    transform: translateY(-130%);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.34, 1.2, 0.4, 1), opacity 0.35s ease;
  }
  .notif.show { transform: translateY(0); opacity: 1; }
  .notif.hide { transform: translateY(-130%); opacity: 0; }

  .notif-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .notif-error .notif-icon { background: var(--danger); }
  .notif-warning .notif-icon { background: var(--warning); }
  .notif-success .notif-icon { background: var(--success); }

  .notif-text { flex: 1; }
  .notif-title {
    font-size: 13.5px;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
  }
  .notif-message {
    font-size: 12.5px;
    color: rgba(255,255,255,0.7);
    line-height: 1.35;
    margin-top: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    .bg-glow, .brand-title, .card-wrapper, .status-dot, .card.shake { animation: none !important; }
    .notif { transition: none !important; }
  }

  @media (max-width: 420px) {
    .brand-title { font-size: 34px; }
    .card { padding: 26px 20px; }
  }
</style>
</head>
<body>

  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="grid-overlay"></div>

  <div id="notif-container"></div>

  <main class="page">
    <div class="brand">
      <h1 class="brand-title">XylonWebz</h1>
      <p class="brand-tag">SECURE ACCESS TERMINAL</p>
    </div>

    <div class="card-wrapper">
      <div class="card" id="card">
        <div class="card-status">
          <span class="status-dot"></span>SYSTEM ONLINE
        </div>

        <h2 class="card-title">Login</h2>

        <form id="login-form" novalidate>
          <label class="field">
            <span class="field-label">Username</span>
            <div class="field-input">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <input type="text" id="username" autocomplete="off" placeholder="Masukin username" required />
            </div>
          </label>

          <label class="field">
            <span class="field-label">Password / Key</span>
            <div class="field-input">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <input type="password" id="password" autocomplete="off" placeholder="Masukin password" required />
              <button type="button" id="toggle-pass" class="icon-btn" aria-label="Tampilkan password">
                <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
          </label>

          <button type="submit" class="btn-primary" id="login-btn">
            <span id="login-btn-text">Login</span>
          </button>
        </form>

        <div class="divider"><span>belum punya akses?</span></div>

        <a href="https://t.me/XylonWebzBot" target="_blank" rel="noopener" class="get-akses">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22 2 2 9.5l6.5 2.2L11 19l3-4 5 3.5L22 2zM9.7 13.4l8.4-7.7-9.9 6.7-.1 3.3.6-.6 1-1.7z"/></svg>
          Get Akses
        </a>
      </div>
    </div>

    <p class="footer-text">XylonWebz © 2026 — key diverifikasi langsung via Telegram</p>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const card = document.getElementById('card');
    const loginBtn = document.getElementById('login-btn');
    const loginBtnText = document.getElementById('login-btn-text');
    const togglePass = document.getElementById('toggle-pass');
    const passwordInput = document.getElementById('password');
    const notifContainer = document.getElementById('notif-container');

    const COOLDOWN_MS = 5000;

    const icons = {
      error: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>',
      warning: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/></svg>',
      success: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
    };

    function showNotification(title, message, type) {
      const existing = notifContainer.querySelector('.notif');
      if (existing) existing.remove();

      const notif = document.createElement('div');
      notif.className = `notif notif-${type}`;
      notif.innerHTML = `
        <div class="notif-icon">${icons[type]}</div>
        <div class="notif-text">
          <div class="notif-title">${title}</div>
          <div class="notif-message">${message}</div>
        </div>
      `;
      notifContainer.appendChild(notif);

      requestAnimationFrame(() => notif.classList.add('show'));

      setTimeout(() => {
        notif.classList.remove('show');
        notif.classList.add('hide');
        setTimeout(() => notif.remove(), 400);
      }, COOLDOWN_MS);
    }

    function shakeCard() {
      card.classList.remove('shake');
      void card.offsetWidth; // reset animation
      card.classList.add('shake');
    }

    function setCooldown() {
      loginBtn.disabled = true;
      loginBtnText.textContent = 'Tunggu sebentar...';
      setTimeout(() => {
        loginBtn.disabled = false;
        loginBtnText.textContent = 'Login';
      }, COOLDOWN_MS);
    }

    togglePass.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (loginBtn.disabled) return;

      const username = document.getElementById('username').value.trim();
      const password = passwordInput.value;

      loginBtn.disabled = true;
      loginBtnText.textContent = 'Mengecek...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.status === 'success') {
          showNotification('Berhasil!', `Welcome ${data.username}`, 'success');
          loginBtnText.textContent = 'Login';
          loginBtn.disabled = false;
        } else if (data.status === 'expired') {
          showNotification('Masa Telah Habis!', 'Tekan Get Akses Untuk Mendapatkan Key Baru', 'warning');
          shakeCard();
          setCooldown();
        } else {
          showNotification('Salah!', 'Username/Password Mungkin Salah', 'error');
          shakeCard();
          setCooldown();
        }
      } catch (err) {
        showNotification('Salah!', 'Username/Password Mungkin Salah', 'error');
        shakeCard();
        setCooldown();
      }
    });
  </script>

</body>
</html>
